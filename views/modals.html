<!-- 여행 추가/수정 모달 -->
<div class="modal-overlay" id="modal-trip">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-trip-heading">새 여행 추가</h2>
      <button class="modal-close" data-close="modal-trip">✕</button>
    </div>

    <!-- 새 여행 / 초대 링크 탭 (수정 모드에선 숨김) -->
    <div class="trip-modal-tabs" id="trip-modal-tabs">
      <button type="button" class="trip-modal-tab active" data-trip-tab="new">새 여행</button>
      <button type="button" class="trip-modal-tab" data-trip-tab="join">초대 링크로 참여</button>
    </div>

    <!-- 새 여행 폼 -->
    <form id="form-trip" novalidate>
      <div class="form-group">
        <label for="trip-name">여행 이름</label>
        <input type="text" id="trip-name" placeholder="예: 여름 유럽 여행" autocomplete="off">
        <span class="field-error" id="err-trip-name"></span>
      </div>
      <div class="form-group">
        <label for="trip-destination">목적지</label>
        <input type="text" id="trip-destination" placeholder="예: 파리, 프랑스" autocomplete="off">
        <span class="field-error" id="err-trip-dest"></span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="trip-start">출발일</label>
          <div class="date-input-wrap">
            <input type="text" id="trip-start" placeholder="2026-07-17" autocomplete="off" maxlength="10">
            <button type="button" class="cal-icon-btn" id="cal-btn-start" aria-label="달력에서 선택">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="3" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="6.5" x2="14" y2="6.5" stroke="currentColor" stroke-width="1.2"/><line x1="5" y1="1.5" x2="5" y2="4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="10" y1="1.5" x2="10" y2="4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <span class="field-error" id="err-trip-start"></span>
        </div>
        <div class="form-group">
          <label for="trip-end">도착일</label>
          <div class="date-input-wrap">
            <input type="text" id="trip-end" placeholder="2026-08-07" autocomplete="off" maxlength="10">
            <button type="button" class="cal-icon-btn" id="cal-btn-end" aria-label="달력에서 선택">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="3" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="6.5" x2="14" y2="6.5" stroke="currentColor" stroke-width="1.2"/><line x1="5" y1="1.5" x2="5" y2="4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="10" y1="1.5" x2="10" y2="4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <span class="field-error" id="err-trip-end"></span>
        </div>
      </div>
      <div class="form-group">
        <label>통화 <span class="label-optional">선택 안 하면 원화(₩ KRW)가 기본</span></label>
        <div class="currency-picker" id="trip-currency-picker">
          <div class="currency-chips" id="trip-currency-chips"></div>
          <div class="currency-search-wrap">
            <input type="text" id="trip-currency-search" class="currency-search-input"
                   placeholder="통화 검색 (예: USD, 달러, $)" autocomplete="off">
            <div class="currency-dropdown" id="trip-currency-dropdown"></div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>테마 색상</label>
        <div class="color-picker" id="color-picker">
          <button type="button" class="color-btn active" data-color="#c8f060" style="background:#c8f060" title="라임"></button>
          <button type="button" class="color-btn" data-color="#f0a060" style="background:#f0a060" title="오렌지"></button>
          <button type="button" class="color-btn" data-color="#60a0f0" style="background:#60a0f0" title="블루"></button>
          <button type="button" class="color-btn" data-color="#c060f0" style="background:#c060f0" title="퍼플"></button>
          <button type="button" class="color-btn" data-color="#f060a0" style="background:#f060a0" title="핑크"></button>
          <button type="button" class="color-btn" data-color="#60f0c8" style="background:#60f0c8" title="민트"></button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-outline" data-close="modal-trip">취소</button>
        <button type="submit" class="btn-primary">저장</button>
      </div>
    </form>

    <!-- 초대 링크 참여 패널 -->
    <div id="trip-join-panel" class="trip-join-panel hidden">
      <div class="form-group">
        <label for="join-link-input">초대 링크</label>
        <input type="text" id="join-link-input" placeholder="초대 링크를 붙여넣으세요" autocomplete="off">
        <span class="field-error" id="err-join-link"></span>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-outline" data-close="modal-trip">취소</button>
        <button type="button" class="btn-primary" id="btn-join-trip">참여하기</button>
      </div>
    </div>
  </div>
</div>

<!-- 일정 추가/수정 모달 -->
<div class="modal-overlay" id="modal-activity">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-activity-heading">일정 추가</h2>
      <button class="modal-close" data-close="modal-activity">✕</button>
    </div>
    <form id="form-activity" novalidate>
      <div class="form-group">
        <label for="activity-category">카테고리</label>
        <select id="activity-category">
          <option value="관광">🏛️ 관광</option>
          <option value="식사">🍽️ 식사</option>
          <option value="교통">🚌 교통</option>
          <option value="숙박">🏨 숙박</option>
          <option value="쇼핑">🛍️ 쇼핑</option>
          <option value="체험">🎟️ 체험</option>
          <option value="기타">📌 기타</option>
        </select>
      </div>
      <div class="form-group">
        <label for="activity-title">제목</label>
        <input type="text" id="activity-title" placeholder="예: 에펠탑 방문" autocomplete="off">
        <span class="field-error" id="err-activity-title"></span>
      </div>
      <div id="activity-dynamic-fields"></div>
      <div class="form-group">
        <label for="activity-notes">메모 (선택)</label>
        <textarea id="activity-notes" placeholder="추가 정보를 입력하세요..." rows="3"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-outline" data-close="modal-activity">취소</button>
        <button type="submit" class="btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<!-- 방 입장 모달 (암호 + 닉네임) -->
<div class="modal-overlay" id="modal-join-room">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>방 참여</h2>
      <button class="modal-close" data-close="modal-join-room">✕</button>
    </div>
    <p class="confirm-msg" id="join-room-title-line"></p>
    <div class="form-group hidden" id="join-password-group">
      <label for="join-password-input">방 암호</label>
      <input type="password" id="join-password-input" placeholder="관리자가 알려준 암호" autocomplete="off">
      <span class="field-error" id="err-join-password"></span>
    </div>
    <div class="form-group">
      <label for="join-nickname-input">방에서 사용할 닉네임</label>
      <input type="text" id="join-nickname-input" placeholder="예: 길동" autocomplete="off" maxlength="20">
      <span class="field-error" id="err-join-nickname"></span>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-outline" data-close="modal-join-room">취소</button>
      <button type="button" class="btn-primary" id="btn-confirm-join">참여하기</button>
    </div>
  </div>
</div>

<!-- 가계부 모달 -->
<div class="modal-overlay" id="modal-budget">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2>💰 가계부</h2>
      <button class="modal-close" data-close="modal-budget">✕</button>
    </div>
    <div id="budget-body" class="budget-body"></div>
    <div class="modal-footer">
      <button class="btn-outline" data-close="modal-budget">닫기</button>
    </div>
  </div>
</div>

<!-- 참여자 모달 (관리자 + 일반 참여자) -->
<div class="modal-overlay" id="modal-members">
  <div class="modal">
    <div class="modal-header">
      <h2>참여자 목록</h2>
      <button class="modal-close" data-close="modal-members">✕</button>
    </div>
    <div id="member-list" class="member-list"></div>

    <!-- 편집 권한 요청 섹션 (방장: 대기 요청 표시 / 뷰어: 요청 버튼) -->
    <div id="edit-request-section" class="edit-request-section" style="display:none">
      <div class="edit-request-divider">편집 권한 요청</div>
      <div id="edit-request-list"></div>
    </div>

    <!-- 초대 링크 섹션 (모든 참여자) -->
    <div id="members-invite-section" class="members-invite-section">
      <div class="members-invite-divider">초대 링크</div>

      <!-- 방장 전용: 공개/사설 설정 -->
      <div id="members-invite-owner-settings" style="display:none">
        <div class="room-type-row">
          <label class="room-type-opt">
            <input type="radio" name="members-room-type" value="public" checked>
            <span class="room-type-pill">🌐 공개 방</span>
          </label>
          <label class="room-type-opt">
            <input type="radio" name="members-room-type" value="private">
            <span class="room-type-pill">🔒 사설 방</span>
          </label>
        </div>
        <p class="form-hint" id="members-invite-type-hint">초대 링크만 있으면 누구나 참여할 수 있어요.</p>
        <div class="form-group hidden" id="members-invite-password-group">
          <label for="members-invite-password">방 암호</label>
          <input type="text" id="members-invite-password" placeholder="참여자가 입력할 암호 (4자 이상)" autocomplete="off" maxlength="40">
          <span class="field-error" id="err-members-invite-password"></span>
        </div>
      </div>

      <!-- 모든 참여자: 링크 복사 -->
      <div class="invite-link-wrap">
        <input type="text" id="members-invite-link-output" readonly>
        <button type="button" class="btn-outline btn-sm" id="btn-copy-members-invite-link">복사</button>
      </div>

      <!-- 방장 전용: 저장 버튼 -->
      <div id="members-invite-save-row" style="display:none; margin-top:0.6rem">
        <button type="button" class="btn-primary btn-sm" id="btn-save-members-invite">설정 저장</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-outline" data-close="modal-members">닫기</button>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>⚙ 설정</h2>
      <button class="modal-close" data-close="modal-settings">✕</button>
    </div>
    <div id="settings-body"></div>
    <div class="modal-footer">
      <button class="btn-outline" data-close="modal-settings">닫기</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>삭제 확인</h2>
    </div>
    <p class="confirm-msg" id="confirm-msg"></p>
    <div class="modal-footer">
      <button class="btn-outline" data-close="modal-confirm">취소</button>
      <button class="btn-danger" id="btn-confirm-ok">삭제</button>
    </div>
  </div>
</div>
