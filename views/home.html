<main>
  <!-- 홈: 여행 목록 화면 -->
  <section id="view-list" class="view active">
    <div class="view-header">
      <div>
        <p class="label">MY TRIPS</p>
        <h1>나의 여행 일정</h1>
      </div>
      <div class="view-header-actions">
        <!-- 정렬 드롭다운 -->
        <div class="sort-dropdown" id="sort-dropdown">
          <button class="btn-outline btn-sm sort-dropdown-btn" id="sort-dropdown-btn">
            <span id="sort-label">최신 등록순</span> ▾
          </button>
          <div class="sort-dropdown-menu" id="sort-dropdown-menu">
            <button class="sort-option active" data-sort="recent">최신 등록순</button>
            <button class="sort-option" data-sort="startDate">여행 날짜순</button>
            <button class="sort-option" data-sort="name">이름순</button>
            <button class="sort-option" data-sort="manual">직접 정렬</button>
          </div>
        </div>
        <button class="btn-primary" id="btn-new-trip">+ 새 여행 추가</button>
      </div>
    </div>
    <div class="trip-grid" id="trip-grid"></div>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✈️</div>
      <h2>아직 여행 일정이 없어요</h2>
      <p>새 여행을 추가하고 일정을 계획해보세요!</p>
      <button class="btn-primary" id="btn-new-trip-empty">+ 첫 여행 추가하기</button>
    </div>
  </section>

  <!-- 우클릭 컨텍스트 메뉴 -->
  <div class="trip-ctx-menu" id="trip-ctx-menu">
    <button class="trip-ctx-item" id="ctx-edit">✎ 수정</button>
    <button class="trip-ctx-item ctx-danger" id="ctx-delete">✕ 삭제</button>
  </div>
