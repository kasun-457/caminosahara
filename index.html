<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 플래너</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
</head>
<body>

  <!-- 로그인 오버레이 -->
  <div class="login-overlay active" id="login-overlay">
    <div class="login-card">
      <div class="login-logo">✈ 여행 플래너</div>
      <h1 class="login-title">함께하는 여행</h1>
      <p class="login-desc">팀원들과 일정을 실시간으로 공유하세요</p>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">로그인</button>
        <button type="button" class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <form id="form-auth" class="auth-form" novalidate>
        <div class="form-group">
          <label for="auth-email">이메일</label>
          <input type="email" id="auth-email" autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="auth-password">비밀번호</label>
          <input type="password" id="auth-password" autocomplete="current-password" placeholder="6자 이상">
        </div>
        <div class="form-group" id="auth-confirm-group" style="display:none">
          <label for="auth-password-confirm">비밀번호 확인</label>
          <input type="password" id="auth-password-confirm" autocomplete="new-password">
        </div>
        <p class="auth-error" id="auth-error"></p>
        <button type="submit" class="btn-primary auth-submit" id="auth-submit">로그인</button>
      </form>

      <div class="auth-divider"><span>또는</span></div>

      <button class="btn-google" id="btn-google-login">
        <span class="google-g">G</span>
        Google로 계속하기
      </button>
    </div>
  </div>

  <!-- 회원탈퇴 재인증 모달 -->
  <div class="modal-overlay" id="modal-delete-account">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>회원탈퇴</h2>
        <button class="modal-close" data-close="modal-delete-account">✕</button>
      </div>
      <p class="confirm-msg">
        탈퇴 시 본인이 만든 여행과 일정이 <strong>영구히 삭제</strong>되며,<br>
        공유받은 여행에서도 제거됩니다.
      </p>
      <form id="form-delete-account" novalidate>
        <div class="form-group" id="reauth-password-group">
          <label for="reauth-password">계속하려면 비밀번호를 입력하세요</label>
          <input type="password" id="reauth-password" autocomplete="current-password">
        </div>
        <p class="auth-error" id="delete-error"></p>
        <div class="modal-footer">
          <button type="button" class="btn-outline" data-close="modal-delete-account">취소</button>
          <button type="submit" class="btn-danger" id="btn-confirm-delete-account">탈퇴하기</button>
        </div>
      </form>
    </div>
  </div>

  <header>
    <nav>
      <div class="logo" id="nav-logo">✈ 여행 플래너</div>
      <div class="nav-right">
        <span class="breadcrumb" id="nav-breadcrumb"></span>
        <button class="btn-outline btn-sm" id="nav-back" style="display:none">← 목록으로</button>
        <div class="user-info" id="user-info" style="display:none">
          <button class="user-btn" id="user-btn" type="button" aria-label="계정 메뉴">
            <img class="user-avatar" id="user-avatar" src="" alt="">
            <span class="user-initial" id="user-initial"></span>
          </button>
          <div class="user-menu" id="user-menu">
            <div class="user-menu-info">
              <p class="user-menu-name" id="user-menu-name"></p>
              <p class="user-menu-email" id="user-menu-email"></p>
            </div>
            <button class="user-menu-item" id="btn-logout" type="button">
              <span>↩</span> 로그아웃
            </button>
            <button class="user-menu-item danger" id="btn-delete-account" type="button">
              <span>✕</span> 회원탈퇴
            </button>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section id="view-list" class="view active">
      <div class="view-header">
        <div>
          <p class="label">MY TRIPS</p>
          <h1>나의 여행 일정</h1>
        </div>
        <button class="btn-primary" id="btn-new-trip">+ 새 여행 추가</button>
      </div>
      <div class="trip-grid" id="trip-grid"></div>
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✈️</div>
        <h2>아직 여행 일정이 없어요</h2>
        <p>새 여행을 추가하고 일정을 계획해보세요!</p>
        <button class="btn-primary" id="btn-new-trip-empty">+ 첫 여행 추가하기</button>
      </div>
    </section>

    <section id="view-trip" class="view">
      <div class="trip-hero" id="trip-hero">
        <div class="trip-hero-content">
          <p class="label" id="trip-dest-label"></p>
          <h1 id="trip-title-label"></h1>
          <p class="trip-dates-label" id="trip-dates-label"></p>
        </div>
        <div class="trip-hero-actions">
          <button class="btn-outline btn-sm" id="btn-share-trip">🔗 초대</button>
          <button class="btn-outline btn-sm" id="btn-edit-trip">수정</button>
          <button class="btn-danger btn-sm" id="btn-delete-trip">삭제</button>
        </div>
      </div>

      <div class="day-tabs-wrapper">
        <div class="day-tabs" id="day-tabs"></div>
      </div>

      <div class="activities-panel" id="activities-panel"></div>
    </section>
  </main>

  <div class="modal-overlay" id="modal-trip">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-trip-heading">새 여행 추가</h2>
        <button class="modal-close" data-close="modal-trip">✕</button>
      </div>
      <form id="form-trip" novalidate>
        <div class="form-group">
          <label for="trip-name">여행 이름</label>
          <input type="text" id="trip-name" placeholder="예: 여름 유럽 여행" autocomplete="off">
          <span class="field-error" id="err-trip-name"></span>
        </div>
        <div class="form-group">
          <label for="trip-destination">목적지</label>
          <input type="text" id="trip-destination" placeholder="예: 파리, 프랑스" autocomplete="off">
          <span class="field-error" id="err-trip-dest"></span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="trip-start">출발일</label>
            <input type="date" id="trip-start">
            <span class="field-error" id="err-trip-start"></span>
          </div>
          <div class="form-group">
            <label for="trip-end">도착일</label>
            <input type="date" id="trip-end">
            <span class="field-error" id="err-trip-end"></span>
          </div>
        </div>
        <div class="form-group">
          <label>테마 색상</label>
          <div class="color-picker" id="color-picker">
            <button type="button" class="color-btn active" data-color="#c8f060" style="background:#c8f060" title="라임"></button>
            <button type="button" class="color-btn" data-color="#f0a060" style="background:#f0a060" title="오렌지"></button>
            <button type="button" class="color-btn" data-color="#60a0f0" style="background:#60a0f0" title="블루"></button>
            <button type="button" class="color-btn" data-color="#c060f0" style="background:#c060f0" title="퍼플"></button>
            <button type="button" class="color-btn" data-color="#f060a0" style="background:#f060a0" title="핑크"></button>
            <button type="button" class="color-btn" data-color="#60f0c8" style="background:#60f0c8" title="민트"></button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-outline" data-close="modal-trip">취소</button>
          <button type="submit" class="btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="modal-activity">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-activity-heading">일정 추가</h2>
        <button class="modal-close" data-close="modal-activity">✕</button>
      </div>
      <form id="form-activity" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="activity-time">시간 (선택)</label>
            <input type="time" id="activity-time">
          </div>
          <div class="form-group">
            <label for="activity-category">카테고리</label>
            <select id="activity-category">
              <option value="관광">🏛️ 관광</option>
              <option value="식사">🍽️ 식사</option>
              <option value="교통">🚌 교통</option>
              <option value="숙박">🏨 숙박</option>
              <option value="쇼핑">🛍️ 쇼핑</option>
              <option value="기타">📌 기타</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="activity-title">제목</label>
          <input type="text" id="activity-title" placeholder="예: 에펠탑 방문" autocomplete="off">
          <span class="field-error" id="err-activity-title"></span>
        </div>
        <div id="activity-dynamic-fields"></div>
        <div class="form-group">
          <label for="activity-notes">메모 (선택)</label>
          <textarea id="activity-notes" placeholder="추가 정보를 입력하세요..." rows="3"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-outline" data-close="modal-activity">취소</button>
          <button type="submit" class="btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 일정 상세 보기 모달 -->
  <div class="modal-overlay" id="modal-activity-detail">
    <div class="modal modal-detail">
      <div class="modal-header">
        <div class="detail-head">
          <span class="detail-cat-badge" id="detail-cat-badge"></span>
          <h2 id="detail-title-text"></h2>
          <p class="detail-time-text" id="detail-time-text"></p>
        </div>
        <button class="modal-close" data-close="modal-activity-detail">✕</button>
      </div>
      <div class="detail-body">
        <div class="detail-fields" id="detail-fields"></div>
        <div class="detail-notes-wrap" id="detail-notes-wrap" style="display:none">
          <p class="detail-section-label">💬 메모</p>
          <p class="detail-notes-text" id="detail-notes-text"></p>
        </div>
        <div class="detail-map-wrap" id="detail-map-wrap" style="display:none">
          <p class="detail-section-label">🗺️ 지도</p>
          <iframe class="detail-map-frame" id="detail-map-frame" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          <a class="btn-map" id="btn-open-map" href="#" target="_blank" rel="noopener">🗺️ Google 지도에서 열기 →</a>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-danger btn-sm" id="btn-delete-detail">삭제</button>
        <button type="button" class="btn-outline btn-sm" data-close="modal-activity-detail">닫기</button>
        <button type="button" class="btn-primary btn-sm" id="btn-edit-detail">수정</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-confirm">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>삭제 확인</h2>
      </div>
      <p class="confirm-msg" id="confirm-msg"></p>
      <div class="modal-footer">
        <button class="btn-outline" data-close="modal-confirm">취소</button>
        <button class="btn-danger" id="btn-confirm-ok">삭제</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
