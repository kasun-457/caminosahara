<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 홈페이지</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav>
      <div class="logo">MyPage</div>
      <ul>
        <li><a href="#">홈</a></li>
        <li><a href="#">소개</a></li>
        <li><a href="#">연락처</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-text">
        <p class="label">HELLO WORLD</p>
        <h1>안녕하세요,<br>저의 홈페이지입니다</h1>
        <p class="sub">이 페이지는 GitHub Pages 배포 테스트용 샘플입니다.<br>HTML · CSS · JS 세 파일로 구성되어 있어요.</p>
        <button id="cta-btn">클릭해보세요 ✦</button>
      </div>
      <div class="hero-deco" aria-hidden="true">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
      </div>
    </section>

    <section class="cards">
      <div class="card">
        <span class="icon">📄</span>
        <h2>HTML</h2>
        <p>페이지의 구조와 콘텐츠를 정의합니다.</p>
      </div>
      <div class="card">
        <span class="icon">🎨</span>
        <h2>CSS</h2>
        <p>색상, 폰트, 레이아웃 등 디자인을 담당합니다.</p>
      </div>
      <div class="card">
        <span class="icon">⚡</span>
        <h2>JavaScript</h2>
        <p>버튼 클릭 같은 동적 기능을 처리합니다.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2024 내 홈페이지 · GitHub Pages 테스트</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
